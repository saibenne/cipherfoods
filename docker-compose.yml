services:
  redis:
    image: redis:7-alpine
    container_name: cipherfoods-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: cipherfoods-keycloak
    restart: unless-stopped
    ports:
      - '8180:8080'
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://host.docker.internal:5432/cipherfoods
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: ${DB_PASSWORD:-cipherfoods_dev}
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
    command: start-dev
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  redis_data:
